<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LinguaGap - Admin</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --teal: #0099a8;
                --teal-dark: #007a87;
                --dark: #1f1f1f;
                --text: rgba(18, 18, 18, 0.75);
                --danger: #d9534f;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: "Assistant", sans-serif;
                background: #f5f5f5;
                color: var(--text);
                min-height: 100vh;
            }
            .header {
                background: #fff;
                border-bottom: 1px solid #e0e0e0;
                padding: 16px 32px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .header h1 {
                font-size: 1.3rem;
                font-weight: 600;
                color: var(--dark);
            }
            .header button {
                padding: 8px 16px;
                font-size: 0.85rem;
                font-family: "Assistant", sans-serif;
                background: transparent;
                color: var(--text);
                border: 1px solid #ccc;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 500;
            }
            .header button:hover {
                background: #f0f0f0;
            }
            .container {
                max-width: 1000px;
                margin: 32px auto;
                padding: 0 24px;
            }
            .add-form {
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
                padding: 24px;
                margin-bottom: 24px;
            }
            .add-form h2 {
                font-size: 1.1rem;
                font-weight: 600;
                color: var(--dark);
                margin-bottom: 16px;
            }
            .form-row {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                align-items: flex-end;
            }
            .form-field {
                flex: 1;
                min-width: 160px;
            }
            .form-field label {
                display: block;
                font-size: 0.8rem;
                font-weight: 600;
                color: var(--dark);
                margin-bottom: 4px;
            }
            .form-field input {
                width: 100%;
                padding: 10px 12px;
                font-size: 0.9rem;
                font-family: "Assistant", sans-serif;
                border: 1px solid #ccc;
                border-radius: 6px;
                color: var(--dark);
            }
            .form-field input:focus {
                outline: none;
                border-color: var(--teal);
                box-shadow: 0 0 0 2px rgba(0, 153, 168, 0.2);
            }
            .logo-upload {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .logo-upload input[type="file"] {
                font-size: 0.8rem;
                max-width: 180px;
            }
            .logo-preview {
                width: 36px;
                height: 36px;
                object-fit: contain;
                border-radius: 4px;
                border: 1px solid #eee;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
                font-family: "Assistant", sans-serif;
                font-weight: 600;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.2s;
                white-space: nowrap;
            }
            .btn-primary {
                background: var(--teal);
                color: #fff;
            }
            .btn-primary:hover {
                background: var(--teal-dark);
            }
            .btn-danger {
                background: var(--danger);
                color: #fff;
            }
            .btn-danger:hover {
                background: #c9302c;
            }
            .btn-secondary {
                background: #e0e0e0;
                color: var(--dark);
            }
            .btn-secondary:hover {
                background: #d0d0d0;
            }
            .btn-sm {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .table-card {
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
                overflow: hidden;
            }
            .table-card h2 {
                font-size: 1.1rem;
                font-weight: 600;
                color: var(--dark);
                padding: 20px 24px 0;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                text-align: left;
                padding: 12px 16px;
                font-size: 0.8rem;
                font-weight: 600;
                color: var(--text);
                border-bottom: 2px solid #eee;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            td {
                padding: 12px 16px;
                border-bottom: 1px solid #f0f0f0;
                font-size: 0.9rem;
                vertical-align: middle;
            }
            tr:last-child td {
                border-bottom: none;
            }
            tr:hover {
                background: #fafafa;
            }
            .account-logo {
                width: 32px;
                height: 32px;
                object-fit: contain;
                border-radius: 4px;
                border: 1px solid #eee;
            }
            .actions {
                display: flex;
                gap: 6px;
            }
            .edit-input {
                padding: 6px 8px;
                font-size: 0.85rem;
                font-family: "Assistant", sans-serif;
                border: 1px solid var(--teal);
                border-radius: 4px;
                width: 100%;
            }
            .toast {
                position: fixed;
                bottom: 24px;
                right: 24px;
                padding: 12px 20px;
                background: var(--dark);
                color: #fff;
                border-radius: 8px;
                font-size: 0.9rem;
                opacity: 0;
                transition: opacity 0.3s;
                pointer-events: none;
                z-index: 100;
            }
            .toast.show {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>LinguaGap Admin</h1>
            <button id="logoutBtn">Logout</button>
        </div>
        <div class="container">
            <div class="add-form">
                <h2>Add Account</h2>
                <form id="addForm">
                    <div class="form-row">
                        <div class="form-field">
                            <label>Email</label>
                            <input type="email" id="newEmail" required />
                        </div>
                        <div class="form-field">
                            <label>Password</label>
                            <input type="text" id="newPassword" required />
                        </div>
                        <div class="form-field">
                            <label>Display Name</label>
                            <input type="text" id="newDisplayName" required />
                        </div>
                        <div class="form-field">
                            <label>Logo</label>
                            <div class="logo-upload">
                                <input
                                    type="file"
                                    id="newLogo"
                                    accept="image/png,image/jpeg,image/svg+xml,image/webp"
                                />
                                <img
                                    id="newLogoPreview"
                                    class="logo-preview"
                                    src="/static/logos/synia.png"
                                    alt=""
                                />
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add</button>
                    </div>
                </form>
            </div>

            <div class="table-card">
                <h2>Demo Accounts</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Logo</th>
                            <th>Email</th>
                            <th>Display Name</th>
                            <th>Password</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="accountsBody"></tbody>
                </table>
            </div>
        </div>
        <div class="toast" id="toast"></div>

        <script src="/static/js/admin.js" defer></script>
    </body>
</html>
