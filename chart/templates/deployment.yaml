apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "linguagap.fullname" . }}
  labels:
    {{- include "linguagap.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  progressDeadlineSeconds: 1800
  # Single-replica GPU workload: rolling-update would surge a 2nd pod that
  # has nowhere to schedule (all 5 MPS GPU replicas on the data node are
  # consumed by other namespaces). Recreate kills the old pod first, then
  # starts the new one — accepts ~25 min downtime per deploy in exchange
  # for never deadlocking on a busy cluster.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "linguagap.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "linguagap.selectorLabels" . | nindent 8 }}
    spec:
      runtimeClassName: nvidia
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.secrets.hfToken.enabled }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.hfToken.secretName }}
                  key: {{ .Values.secrets.hfToken.secretKey }}
            {{- end }}
            {{- if .Values.secrets.sessionSecret.enabled }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sessionSecret.secretName }}
                  key: {{ .Values.secrets.sessionSecret.secretKey }}
            {{- end }}
            {{- if .Values.secrets.adminPassword.enabled }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.adminPassword.secretName }}
                  key: {{ .Values.secrets.adminPassword.secretKey }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: hf-cache
              mountPath: /data/hf
            # Mount the same PVC's "state" subdirectory at /data/state so
            # accounts.json and uploaded logos persist across pod restarts.
            # DATA_DIR points here; the HF cache stays at the PVC root for
            # backwards compatibility with the existing 40Gi volume.
            - name: hf-cache
              mountPath: /data/state
              subPath: state
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ include "linguagap.fullname" . }}-hf-cache
        {{- end }}
